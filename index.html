    <script>
      (function () {
        const milestones = [25, 50, 75, 90, 100];
        const fired = new Set();

        function getScrollPercent() {
          const doc = document.documentElement;
          const body = document.body;
          const scrollTop = window.scrollY || doc.scrollTop || body.scrollTop || 0;
          const scrollHeight = Math.max(
            body.scrollHeight,
            doc.scrollHeight,
            body.offsetHeight,
            doc.offsetHeight,
            body.clientHeight,
            doc.clientHeight
          );
          const viewport = window.innerHeight || doc.clientHeight || 0;
          const maxScrollable = Math.max(scrollHeight - viewport, 0);
          if (maxScrollable === 0) return 100;
          return Math.min(100, Math.round((scrollTop / maxScrollable) * 100));
        }

        function trackDepth() {
          const percent = getScrollPercent();
          milestones.forEach((m) => {
            if (percent >= m && !fired.has(m)) {
              fired.add(m);
              window.dataLayer = window.dataLayer || [];
              window.dataLayer.push({
                event: "scroll_depth",
                percent_scrolled: m,
                page_path: location.pathname,
                page_title: document.title
              });
            }
          });
        }

        window.addEventListener("scroll", trackDepth, { passive: true });
        window.addEventListener("load", trackDepth);
      })();
    </script>
